<div class="modal fade" id="mgrModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h6 id="modalTitle" class="modal-title fw-bold"></h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-light">
        <div class="alert alert-info small shadow-sm" style="white-space: pre-line;">
            <strong><i class="bi bi-info-circle-fill"></i> เกณฑ์การประเมิน: </strong><span id="criteriaBox"></span><br>
            <strong><i class="bi bi-paperclip"></i> สิ่งที่ต้องแนบ: </strong><span id="evidenceReq" class="text-danger fw-bold"></span>
        </div>

        <input type="hidden" id="editId"> 
        <input type="hidden" id="oldFileUrl">
        <div class="bg-white p-3 rounded shadow-sm border">
          <label class="fw-bold small">รายละเอียด / ชื่อกิจกรรม / ชื่อเอกสาร</label>
          <input type="text" id="note" class="form-control mb-2" placeholder="พิมพ์รายละเอียดที่นี่...">
          
          <div id="dateArea" class="d-none">
            <label class="fw-bold small text-primary">วันที่ทำกิจกรรม <span class="text-danger">*</span></label>
            <input type="date" id="activityDate" class="form-control mb-2 border-primary">
          </div>
          
          <label class="fw-bold small">แนบไฟล์ผลงาน <span class="text-danger">*</span></label>
          <input type="file" id="file" class="form-control" accept=".jpeg, .jpg, .png, .pdf, .csv, .docx, .xls, .xlsx" multiple>
          <small id="fileHelp" class="text-danger mt-1 d-block fw-bold"><i class="bi bi-info-circle"></i> สามารถลากคลุม หรือกด Ctrl ค้าง เพื่อเลือกหลายไฟล์พร้อมกันได้ (ขนาดไม่เกิน 5 MB ต่อไฟล์)</small>
        </div>
        
        <button class="btn btn-success w-100 mt-3 fw-bold" onclick="save()"><i class="bi bi-save-fill"></i> บันทึกลงโฟลเดอร์</button>
        
        <h6 class="fw-bold mt-4 border-bottom pb-2 text-primary"><i class="bi bi-clock-history"></i> ประวัติผลงานที่จัดเก็บแล้ว</h6>
        <div id="history"></div>
      </div>
    </div>
  </div>
</div>
